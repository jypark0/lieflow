# @package _global_
# Flow matching model: SO(3) -> SO(2) for ModelNet10
# Small Transformer for quick testing
dataset:
  batch_size: 1024
  num_workers: 4

model:
  _target_: lieflow.flow_matching.arrow.model.Flow_SO3
  device: ${device}
  net:
    _target_: lieflow.flow_matching.arrow.net.TransformerTimeEmbedding
    in_dim: 3  # 3D points
    out_dim: 3  # 3-vector Lie algebra element for SO(3)
    hidden_dim: 256  # Smaller for faster training
    num_heads: 4     # Fewer heads
    num_layers: 2    # Fewer layers
    time_embed_dim: 64
  prior_dist:
    _target_: lieflow.distributions.SO3UniformDistribution
  max_grad_norm: 1
  time_sampling: "power"  # Power distribution for time sampling #uniform
  time_sampling_kwargs:
    skewness: 5.0


optimizer:
  _target_: torch.optim.AdamW
  lr: 1e-4
  weight_decay: 0.01

train:
  epochs: 2000  # Shorter for quick testing

test:
  epoch_interval: 10  # More frequent evaluation
  n_steps: 50  # Fewer steps for faster evaluation
