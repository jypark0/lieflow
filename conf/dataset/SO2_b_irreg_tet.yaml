# @package _global_
# Irregular-tetrahedron dataset for the SO(2)(b) experiment: rotations
# around the tilted axis (0, 1/2, -sqrt(3)/2).
#
# Two SO(2) variants in the paper Table 2(a):
#   SO(2)(a) -> rotations around the z-axis           (config: SO2_irreg_tet)
#   SO(2)(b) -> rotations around (0, 1/2, -sqrt(3)/2) (this config)
#
# We reuse MultiAxisRotation3DDistribution with a single axis.
dataset:
  name: SO2_b_irreg_tet
  group: "SO(2)_b"
  train:
    _target_: lieflow.data.sampling_dataset.DistributionSamplingDataset
    dist:
      _target_: lieflow.distributions.ObjectTransformDistribution
      base_dist:
        _target_: lieflow.distributions.MultiAxisRotation3DDistribution
        rotation_axes:
          - [0., 0.5, -0.866]   # SO(2)(b) axis (0, 1/2, -sqrt(3)/2)
        coeff_dist: null         # null uses Uniform(-pi, pi)
      base_object:
        _target_: lieflow.data.objects.Object
        name: "irreg_tet"
    num_samples: 20_000
    return_transform: False

  test:
    _target_: lieflow.data.sampling_dataset.DistributionSamplingDataset
    dist:
      _target_: lieflow.distributions.ObjectTransformDistribution
      base_dist:
        _target_: lieflow.distributions.MultiAxisRotation3DDistribution
        rotation_axes: ${dataset.train.dist.base_dist.rotation_axes}
        coeff_dist: ${dataset.train.dist.base_dist.coeff_dist}
      base_object:
        _target_: ${dataset.train.dist.base_object._target_}
        name: ${dataset.train.dist.base_object.name}
    num_samples: 5_000
    return_transform: true
