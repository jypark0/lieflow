# @package _global_
# ModelNet10 dataset with Icosahedral group transformation, random point masking,
# and controllable SO(3) noise close to the identity.


dataset:
  name: Ico_modelnet10_noisy
  group: "I"


  share: true       
  train_ratio: 1.0   
  test_ratio: 0.5   
  split_seed: 42    

  # --- Masking ---
  n_masked_points: 12   # Number of points randomly zeroed out per sample
  mask_value: 0.0

  # --- SO(3) noise level (radians, controls std of the rotation-angle perturbation) ---
  noise_scale: 0.1

  # --- Training distribution ---
  train:
    _target_: lieflow.data.sampling_dataset.DistributionSamplingDataset
    dist:
      _target_: lieflow.distributions.NoisyMaskedObjectTransformDistribution
      base_dist:
        _target_: lieflow.distributions.DiscreteDeltaMixture
        group: ${dataset.group}
        locs:
          _target_: lieflow.distributions.finite_group_elements_on_R3
          group: "I"   # Icosahedral group (60 elements)
      base_objects:
        _target_: lieflow.data.ModelNet10.dataset.ModelNet10Loader
        root: data/ModelNet10
        split: "train"
        n_points: 128
        n_samples_per_class: 10
        random_seed: 42
      n_masked_points: ${dataset.n_masked_points}
      mask_value: ${dataset.mask_value}
      random_seed: null      # null = random masking indices each call
      noise_scale: ${dataset.noise_scale}
    num_samples: 50_000      # Total pool size (split into train and test via share mode)
    return_transform: false
