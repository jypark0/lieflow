# @package _global_
# MI-Motion pedestrian skeleton dataset for SO(3) symmetry discovery.
#
# Data source:
#   data/MI-Motion/skeletons_normalized.npy  (N≈538 k, 20 joints × 3D)
#   Generated by extract_mi_motion_skeletons.py
#
# Each sample is a single-frame pedestrian skeleton (20-joint point cloud)
# normalized so that:
#   - Joint 12 (pelvis) is at the origin
#   - Head-to-foot height ≈ 1.0
#
# No group label is required: the model learns the symmetry from data alone.
# Random SO(3) rotations are applied inside Flow_SO3.train_net / eval_net.

dataset:
  name: SO3_MI_Motion_skeleton
  group: "SO3"       # prior group label (used for plot legends)
  # gt_group: "SO2_z"  # assumed ground-truth symmetry: SO(2) rotations around z-axis
                     # used only for W1 evaluation and visualization reference,
                     # NOT applied to the data
  batch_size: 1024
  num_workers: 4

  train:
    _target_: lieflow.data.MI_Motion.dataset.MIMotionSkeletonDataset
    data_path: data/MI-Motion/skeletons_normalized.npy
    metadata_path: data/MI-Motion/metadata.npz
    split: train
    train_ratio: 0.9
    num_samples: 500_000   
    random_seed: 42

  test:
    _target_: lieflow.data.MI_Motion.dataset.MIMotionSkeletonDataset
    data_path: data/MI-Motion/skeletons_normalized.npy
    metadata_path: data/MI-Motion/metadata.npz
    split: test
    train_ratio: 0.9
    num_samples: 5_000
    random_seed: 42
