# @package _global_
dataset:
  name: Ico_irreg_tet
  group: "Ico"
  train:
    _target_: lieflow.data.sampling_dataset.DistributionSamplingDataset
    dist:
      _target_: lieflow.distributions.ObjectTransformDistribution
      base_dist:
        _target_: lieflow.distributions.DiscreteDeltaMixture
        group: ${dataset.group}
        locs:
          _target_: lieflow.distributions.finite_group_elements_on_R3
          group: "I"
      base_object:
        _target_: lieflow.data.objects.Object
        name: "irreg_tet"
    num_samples: 20_000
    return_transform: False

  test:
    _target_: lieflow.data.sampling_dataset.DistributionSamplingDataset
    dist:
      _target_: lieflow.distributions.ObjectTransformDistribution
      base_dist:
        _target_: lieflow.distributions.DiscreteDeltaMixture
        group: ${dataset.group}
        locs:
          _target_: lieflow.distributions.finite_group_elements_on_R3
          group: ${dataset.train.dist.base_dist.locs.group}
      base_object:
        _target_: ${dataset.train.dist.base_object._target_}
        name: ${dataset.train.dist.base_object.name}
    num_samples: 5_000
    return_transform: true
